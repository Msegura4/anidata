name: CI

on:
  push:
    branches: [main, test, test-kemil]
  pull_request:
    branches: [main, test, test-kemil]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: anidata-scraper

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff
      - run: ruff check anidata_scraper/ tests/

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r anidata-scraper/requirements-dev.txt

      - run: pytest --cov=anidata_scraper --cov-report=term-missing
