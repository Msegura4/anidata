name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    name: Run Scraper + Trigger Airflow
    runs-on: ubuntu-latest

    # IMPORTANT : on ne continue QUE si CI est OK
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 3. Install dependencies scraper
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r anidata-scraper/requirements-dev.txt

      # 4. Run scraper (génère JSON dans data/input/)
      - name: Run scraper
        run: |
          python -m anidata_scraper.scraper \
            --output-dir data/input \
            --base-url http://mock-site

      # 5. Vérification (debug)
      - name: Check output files
        run: ls -R data/input

      # 6. Trigger Airflow DAG via API
      - name: Trigger Airflow DAG
        run: |
          curl -X POST "http://airflow:8080/api/v1/dags/anidata_pipeline/dagRuns" \
          -H "Content-Type: application/json" \
          -u "airflow:airflow" \
          -d '{
            "conf": {
              "source": "github_actions",
              "trigger": "cd_pipeline"
            }
          }'
